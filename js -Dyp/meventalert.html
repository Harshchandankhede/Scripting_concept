<!DOCTYPE html>
<html>
<head>
  <title>Mouse Double Click Event</title>
</head>
<body>
  <h2>Double-click the button to see an alert</h2>

  <!-- Button with double-click event -->
  <button ondblclick="showAlert()">Double Click Me</button>

  <script>
    function showAlert() {
      alert("Mouse double-clicked on the button!");
    }
  </script>
</body>
</html>
