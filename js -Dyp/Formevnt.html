<!DOCTYPE html>
<html>
<head>
    <title>Dropdown Change Event</title>

    <script>
        function showAlert() {
            alert("You changed the selection!");
        }
    </script>

</head>

<body>

<h2>Dropdown Change Event</h2>

Select Course:

<select onchange="showAlert()">
    <option>Java</option>
    <option>JavaScript</option>
    <option>Python</option>
    <option>C++</option>
</select>

</body>
</html>
