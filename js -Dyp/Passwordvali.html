<!DOCTYPE html>
<html>
<head>
    <title>Password Validation</title>

    <script>
        function passwordValidation() {

            
            let pass = prompt("Enter your Password:");

            
            if (pass === null) {
                alert("Input cancelled");
                return;
            }

            
            if (pass === "") {
                alert("Password cannot be empty");
                return;
            }

        
            if (pass.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            
            let pattern = /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/;

            
            if (pass.match(pattern)) {
                alert("Valid Password");
            }
            else {
                alert("Invalid Password! Must contain 1 capital letter and 1 number");
            }
        }
    </script>

</head>

<body>

<h2>Password Validation Using JavaScript</h2>

<button onclick="passwordValidation()">
    Enter Password
</button>

</body>
</html>
