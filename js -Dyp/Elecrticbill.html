<html> 
<head> 
    <title> electric bill in JavaScript </title> 
</head> 
<body> 
    <script> 
       
    let units =parseInt(prompt("enter your bill units"));

    if (units >=0 && units <=50) {
        console.log(units * 3);
    }else if(units >=51 && units <=100) {
        console.log(units * 5);
    }
    else {
        console.log(units * 9);
        
    }
        
    </script> 
</body> 
</html>
