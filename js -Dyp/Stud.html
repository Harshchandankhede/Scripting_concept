<!DOCTYPE html>
<html>
<head>
  <title>Student Details</title>
</head>
<body>
  <h2>Student Information</h2>

  <script>
    
 class Student {
      constructor(name, rollNo, course, marks) {
        this.name = name;
        this.rollNo = rollNo;
        this.course = course;
        this.marks = marks;
      }

     
      displayDetails() {
        document.write(`<p><strong>Name:</strong> ${this.name}</p>`);
        document.write(`<p><strong>Roll No:</strong> ${this.rollNo}</p>`);
        document.write(`<p><strong>Course:</strong> ${this.course}</p>`);
        document.write(`<p><strong>Marks:</strong> ${this.marks}</p>`);
      }
    }

    
    let name = prompt("Enter student name:");
    let rollNo = prompt("Enter roll number:");
    let course = prompt("Enter course name:");
    let marks = prompt("Enter marks:");


    const student1 = new Student(name, rollNo, course, marks);

    
    student1.displayDetails();
  </script>
</body>
</html>
