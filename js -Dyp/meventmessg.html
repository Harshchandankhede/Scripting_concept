<!DOCTYPE html>
<html>
<head>
  <title>Mouse Event Example</title>
</head>
<body>
  <h2>Mouse Event Demo</h2>

  <!-- Button -->
  <button onmouseover="showMessage()">Hover Over Me</button>

  <script>
    function showMessage() {
      document.write("<p>Mouse moved over the button!</p>");
    }
  </script>
</body>
</html>
